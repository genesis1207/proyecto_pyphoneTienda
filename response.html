<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factura – Tienda Thiago</title>
  <style>
    :root {
      --ink:     #0d1b2a;
      --blue:    #1a56db;
      --blue-dk: #0d3b8c;
      --blue-lt: #e8f0fe;
      --accent:  #f59e0b;
      --green:   #059669;
      --red:     #dc2626;
      --gray:    #6b7280;
      --bg:      #f8fafc;
      --card:    #ffffff;
      --border:  #e2e8f0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--ink); }

    header {
      background: var(--blue-dk); color: #fff;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 60px;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    .logo { font-size: 1.2rem; font-weight: 800; }
    .logo em { color: var(--accent); font-style: normal; }
    .header-actions { display: flex; gap: 10px; }
    .btn-action {
      border-radius: 8px; padding: 8px 16px; font-size: .84rem; font-weight: 700;
      cursor: pointer; border: none; transition: .15s;
    }
    .btn-print   { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.3); }
    .btn-print:hover { background: rgba(255,255,255,.25); }
    .btn-shop    { background: var(--accent); color: var(--ink); }
    .btn-shop:hover { filter: brightness(1.05); }

    .steps {
      display: flex; align-items: center; justify-content: center;
      gap: 0; padding: 20px 28px; background: #fff; border-bottom: 1.5px solid var(--border);
    }
    .step { display: flex; align-items: center; gap: 8px; font-size: .82rem; }
    .step-num {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: .75rem;
    }
    .step.done .step-num   { background: var(--green); color: #fff; }
    .step.active .step-num { background: var(--blue);  color: #fff; }
    .step.done  .step-label  { color: var(--green); font-weight:700; }
    .step.active .step-label { font-weight: 700; color: var(--blue); }
    .step-line { width: 50px; height: 2px; background: var(--border); margin: 0 8px; }
    .step-line.done { background: var(--green); }

    .page-wrap { max-width: 780px; margin: 30px auto; padding: 0 20px 60px; }

    .status-banner {
      border-radius: 14px; padding: 20px 24px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 16px;
    }
    .status-banner.ok  { background: #d1fae5; border: 1.5px solid #6ee7b7; }
    .status-banner.err { background: #fee2e2; border: 1.5px solid #fca5a5; }
    .status-icon { font-size: 2.4rem; }
    .status-text h2 { font-size: 1.1rem; font-weight: 800; }
    .status-text p  { font-size: .88rem; margin-top: 2px; }
    .status-banner.ok  .status-text h2 { color: #065f46; }
    .status-banner.ok  .status-text p  { color: #047857; }
    .status-banner.err .status-text h2 { color: #991b1b; }
    .status-banner.err .status-text p  { color: #b91c1c; }

    .invoice {
      background: var(--card); border-radius: 16px;
      border: 1.5px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      overflow: hidden;
    }

    .inv-header {
      background: linear-gradient(135deg, var(--blue-dk), #1d4ed8);
      color: #fff; padding: 28px 32px;
      display: flex; justify-content: space-between; align-items: flex-start;
      flex-wrap: wrap; gap: 16px;
    }
    .inv-brand .brand-name { font-size: 1.5rem; font-weight: 900; letter-spacing: -.5px; }
    .inv-brand .brand-name em { color: var(--accent); font-style: normal; }
    .inv-brand .brand-sub  { font-size: .8rem; color: #bfdbfe; margin-top: 4px; }
    .inv-brand .brand-ruc  { font-size: .8rem; color: #93c5fd; margin-top: 2px; }
    .inv-meta { text-align: right; }
    .inv-meta .inv-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .8px; color: #93c5fd; }
    .inv-meta .inv-num   { font-size: 1.3rem; font-weight: 900; color: var(--accent); }
    .inv-meta .inv-date  { font-size: .82rem; color: #bfdbfe; margin-top: 4px; }

    .inv-status-bar {
      padding: 10px 32px; font-size: .82rem; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
    }
    .inv-status-bar.ok  { background: #d1fae5; color: #065f46; }
    .inv-status-bar.err { background: #fee2e2; color: #991b1b; }

    .inv-section { padding: 20px 32px; border-bottom: 1.5px solid var(--border); }
    .inv-section:last-child { border-bottom: none; }
    .inv-section-title {
      font-size: .72rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .8px; color: var(--blue); margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 2px solid var(--blue-lt);
    }
    .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .inv-field .lbl { font-size: .72rem; color: var(--gray); text-transform: uppercase; letter-spacing: .5px; }
    .inv-field .val { font-size: .9rem; font-weight: 600; margin-top: 2px; }

    .prod-table { width: 100%; border-collapse: collapse; }
    .prod-table thead th {
      background: var(--blue-lt); color: var(--blue-dk);
      font-size: .74rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .5px; padding: 8px 12px; text-align: left;
    }
    .prod-table thead th:last-child { text-align: right; }
    .prod-table tbody td {
      padding: 11px 12px; font-size: .88rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .prod-table tbody tr:last-child td { border-bottom: none; }
    .prod-table tbody td:last-child { text-align: right; font-weight: 700; }
    .td-icon { font-size: 1.5rem; text-align: center !important; }
    .td-name { font-weight: 600; }
    .td-detail { font-size: .75rem; color: var(--gray); margin-top: 2px; }
    .td-qty { text-align: center !important; font-weight: 700; }
    .td-price { text-align: right !important; }

    .totals-block { padding: 0 32px 24px; }
    .tot-row {
      display: flex; justify-content: space-between;
      padding: 7px 0; font-size: .9rem; color: var(--gray);
      border-bottom: 1px dashed var(--border);
    }
    .tot-row:last-child { border-bottom: none; }
    .tot-row.grand {
      font-size: 1.2rem; font-weight: 900; color: var(--blue-dk);
      padding-top: 14px; border-top: 2.5px solid var(--blue-dk); margin-top: 6px;
      border-bottom: none;
    }

    .trx-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    @media (max-width: 600px) { .trx-grid { grid-template-columns: 1fr 1fr; } .inv-grid { grid-template-columns: 1fr; } }
    .trx-chip {
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
      padding: 10px 14px;
    }
    .trx-chip .lbl { font-size: .7rem; color: var(--gray); text-transform: uppercase; letter-spacing: .5px; }
    .trx-chip .val { font-size: .85rem; font-weight: 700; margin-top: 3px; word-break: break-all; }
    .val-approved { color: var(--green); }
    .val-cancelled { color: var(--red); }

    .inv-footer {
      background: var(--blue-lt); padding: 16px 32px; text-align: center;
      font-size: .78rem; color: var(--blue-dk);
    }
    .inv-footer strong { font-weight: 800; }

    .final-actions { display: flex; gap: 14px; margin-top: 24px; flex-wrap: wrap; }
    .btn-lg {
      flex: 1; min-width: 160px; padding: 14px 24px;
      border: none; border-radius: 12px; font-size: .95rem; font-weight: 800;
      cursor: pointer; transition: .15s; text-align: center; text-decoration: none;
      display: inline-block;
    }
    .btn-primary   { background: var(--blue);  color: #fff; }
    .btn-secondary { background: var(--card); color: var(--blue-dk); border: 2px solid var(--blue-lt); }
    .btn-lg:hover  { filter: brightness(.93); transform: translateY(-1px); }

    .loading-wrap { text-align: center; padding: 60px 20px; }
    .spinner {
      width: 44px; height: 44px; border: 4px solid var(--border);
      border-top-color: var(--blue); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media print {
      header, .steps, .status-banner, .final-actions,
      .btn-print, .btn-shop { display: none !important; }
      body, .invoice { background: #fff; box-shadow: none; }
      .page-wrap { margin: 0; padding: 0; max-width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Tienda <em>Thiago</em></div>
  <div class="header-actions">
    <button class="btn-action btn-print" onclick="window.print()">🖨️ Imprimir</button>
    <a href="index.html" class="btn-action btn-shop">🛒 Seguir comprando</a>
  </div>
</header>

<div class="steps">
  <div class="step done">
    <div class="step-num">✓</div>
    <span class="step-label">Productos</span>
  </div>
  <div class="step-line done"></div>
  <div class="step done">
    <div class="step-num">✓</div>
    <span class="step-label">Pago</span>
  </div>
  <div class="step-line done"></div>
  <div class="step active">
    <div class="step-num">3</div>
    <span class="step-label">Factura</span>
  </div>
</div>

<div class="page-wrap">
  <div class="loading-wrap" id="loading">
    <div class="spinner"></div>
    <p style="color:var(--gray);font-size:.95rem">Confirmando pago con Payphone…</p>
  </div>
  <div id="factura-wrap" style="display:none"></div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════
// CONFIGURACIÓN
// ════════════════════════════════════════════════════════════════════
const PAYPHONE_TOKEN = 'w5LNbRnVPAktNvYoO1mI-U1rD6E29IqoNGW530pDISGxDRkLDUc_ymKrQAQEaerReq8MFhWFA2UzoZZIvrG8OaaFAlfXrQrTMVwI6Ba6Q3x1j4NQxDnGMCobrL47Ao4zHjm-O4PKAXDoNfd2IiylD2UkhdmVOaAVAsayRyFdYobpWsQeAkAw-86CI8kInnPfLRvcdhKZxKyL24-kHHwyxVYyWXmUQkPt4i7QrFNuuXKU32spYqZSE4YpPFIGi_wZdSuI74FQ34obN6oDAIB4hKyhykA65EuycYXBeOhezIv3bYnxE1-bloGB828bSnbPcJQ4r6-0JTs7CXPZhZBIGawqlq0';

const items          = JSON.parse(sessionStorage.getItem('carrito')     || '[]');
const totales        = JSON.parse(sessionStorage.getItem('totales')     || '{}');
const datosEntrega   = JSON.parse(sessionStorage.getItem('datosEntrega')|| 'null');
const savedClientTxId = sessionStorage.getItem('clientTransactionId') || '';

function getParam(n) { return new URLSearchParams(window.location.search).get(n); }
const urlId          = getParam('id');
const urlClientTxId  = getParam('clientTransactionId');

function numFactura() {
  const n = parseInt(localStorage.getItem('facturaSeq') || '0') + 1;
  localStorage.setItem('facturaSeq', n);
  return 'F-' + String(n).padStart(5, '0');
}
const FACTURA_NUM = numFactura();
const FECHA_HOY   = new Date().toLocaleString('es-EC', {
  day:'2-digit', month:'long', year:'numeric',
  hour:'2-digit', minute:'2-digit'
});

// ════════════════════════════════════════════════════════════════════
// CONFIRMAR TRANSACCIÓN CON PAYPHONE (RESPONSE)
// ════════════════════════════════════════════════════════════════════
async function confirmar() {
  const id       = urlId;
  const clientTx = urlClientTxId || savedClientTxId;

  let apiData = null;

  if (id && clientTx) {
    try {
      const res = await fetch('https://paymentbox.payphonetodoesposible.com/api/confirm', {
        method:  'POST',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': 'Bearer ' + PAYPHONE_TOKEN
        },
        body: JSON.stringify({ id: parseInt(id), clientTxId: clientTx })
      });
      apiData = await res.json();
    } catch (e) {
      console.warn('Error confirmando:', e);
    }
  }

  const approved = apiData ? apiData.statusCode === 3 : (items.length > 0 ? null : false);
  renderFactura(apiData, approved);
}

// ════════════════════════════════════════════════════════════════════
// RENDERIZAR FACTURA
// ════════════════════════════════════════════════════════════════════
function renderFactura(api, approved) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('factura-wrap').style.display = 'block';

  // Si perdimos el carrito/totales de sessionStorage, usamos el monto que confirmó Payphone
  const totalApi = api?.amount ? api.amount / 100 : null;

  const subtotal = totales.subtotal ?? (items.length ? items.reduce((s,i)=>s+i.precio*i.qty, 0) : null);
  const iva      = totales.iva      ?? (subtotal !== null ? subtotal * 0.15 : null);
  const total    = totales.total    ?? (subtotal !== null ? subtotal + iva : totalApi) ?? 0;

  const sinDatosCarrito = subtotal === null;

  const statusOk  = approved === true  || (api && api.statusCode === 3);
  const statusErr = approved === false || (api && api.statusCode === 2);

  const statusClass = statusOk ? 'ok' : statusErr ? 'err' : 'ok';
  const bannerIcon  = statusOk ? '✅' : statusErr ? '❌' : '🧾';
  const bannerTitle = statusOk ? '¡Pago aprobado exitosamente!'
                    : statusErr ? 'Pago cancelado o rechazado'
                    : 'Vista previa de factura';
  const bannerMsg   = statusOk
    ? `Tu pedido ha sido confirmado. Número de factura: ${FACTURA_NUM}`
    : statusErr
    ? 'La transacción no fue completada. No se realizó ningún cobro.'
    : 'Completa el pago para generar la factura oficial.';

  const trxChips = api ? [
    { lbl:'Estado',                 val: api.transactionStatus  || '—', cls: statusOk?'val-approved':'val-cancelled' },
    { lbl:'Código Autorización',    val: api.authorizationCode  || '—' },
    { lbl:'ID Payphone',            val: api.transactionId      || '—' },
    { lbl:'ID Comercio',            val: api.clientTransactionId|| '—' },
    { lbl:'Tarjeta',                val: api.cardBrand ? api.cardBrand.split(' ')[0] : '—' },
    { lbl:'Últimos dígitos',        val: api.lastDigits         || '—' },
  ] : [];

  // Nombre del comprador: preferimos lo que Payphone devuelve (optionalParameter4),
  // si no, lo que guardamos localmente en datosEntrega
  const nombreComprador = api?.optionalParameter4
    || (datosEntrega ? `${datosEntrega.nombre} ${datosEntrega.apellido}` : 'Cliente Tienda Thiago');

  // La dirección de entrega viaja en optionalParameter3
  const direccionEntrega = api?.optionalParameter3
    || (datosEntrega ? datosEntrega.direccion + (datosEntrega.referencia ? ' - ' + datosEntrega.referencia : '') : '—');

  document.getElementById('factura-wrap').innerHTML = `
    <div class="status-banner ${statusClass}">
      <div class="status-icon">${bannerIcon}</div>
      <div class="status-text">
        <h2>${bannerTitle}</h2>
        <p>${bannerMsg}</p>
      </div>
    </div>

    <div class="invoice">
      <div class="inv-header">
        <div class="inv-brand">
          <div class="brand-name">Tienda <em>Thiago</em></div>
          <div class="brand-sub">Tecnología Premium para Ecuador</div>
          <div class="brand-ruc">RUC: 1390085123001 · Manta, Manabí</div>
        </div>
        <div class="inv-meta">
          <div class="inv-label">Factura Electrónica</div>
          <div class="inv-num">${FACTURA_NUM}</div>
          <div class="inv-date">📅 ${FECHA_HOY}</div>
        </div>
      </div>

      <div class="inv-status-bar ${statusClass}">
        ${statusOk ? '✅ Transacción APROBADA' : statusErr ? '❌ Transacción CANCELADA' : '🧾 Factura generada'}
        ${api ? ` · Auth: <strong>${api.authorizationCode || '—'}</strong> · TrxID: <strong>${api.transactionId || '—'}</strong>` : ''}
      </div>

      <div class="inv-section">
        <div class="inv-section-title">Datos de la transacción</div>
        <div class="inv-grid">
          <div class="inv-field">
            <div class="lbl">Emisor</div>
            <div class="val">Tienda Thiago</div>
          </div>
          <div class="inv-field">
            <div class="lbl">RUC Emisor</div>
            <div class="val">1390085123001</div>
          </div>
          <div class="inv-field">
            <div class="lbl">Dirección emisor</div>
            <div class="val">Av. 4 de Noviembre, Manta – Manabí</div>
          </div>
          <div class="inv-field">
            <div class="lbl">Teléfono</div>
            <div class="val">+593 99 123 4567</div>
          </div>
          <div class="inv-field">
            <div class="lbl">Comprador</div>
            <div class="val">${nombreComprador}</div>
          </div>
          <div class="inv-field">
            <div class="lbl">Correo comprador</div>
            <div class="val">${api?.email || '—'}</div>
          </div>
          <div class="inv-field" style="grid-column:1/-1">
            <div class="lbl">Dirección de entrega</div>
            <div class="val">${direccionEntrega}</div>
          </div>
        </div>
      </div>

      <div class="inv-section">
        <div class="inv-section-title">Detalle de productos</div>
        ${sinDatosCarrito ? `
        <p style="font-size:.82rem;color:var(--gray)">No se pudo recuperar el detalle de productos de esta sesión.</p>
        ` : `
        <table class="prod-table">
          <thead>
            <tr>
              <th style="width:44px"></th>
              <th>Producto</th>
              <th style="width:60px;text-align:center">Cant.</th>
              <th style="width:90px;text-align:right">P. Unit.</th>
              <th style="width:90px;text-align:right">Subtotal</th>
            </tr>
          </thead>
          <tbody>
            ${items.map(it => `
            <tr>
              <td class="td-icon">${it.icon}</td>
              <td>
                <div class="td-name">${it.nombre}</div>
                <div class="td-detail">SKU: ${it.id}</div>
              </td>
              <td class="td-qty">${it.qty}</td>
              <td class="td-price">$${it.precio.toFixed(2)}</td>
              <td class="td-price">$${(it.precio * it.qty).toFixed(2)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
        `}
      </div>

      <div class="totals-block">
        ${sinDatosCarrito ? `
        <div style="background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:.78rem;color:#92400e;">
          ⚠️ El monto mostrado corresponde al total confirmado por Payphone.
        </div>` : ''}
        <div class="tot-row"><span>Subtotal (base imponible)</span><span>$${(subtotal ?? total/1.15).toFixed(2)}</span></div>
        <div class="tot-row"><span>IVA 15%</span><span>$${(iva ?? (total - total/1.15)).toFixed(2)}</span></div>
        <div class="tot-row"><span>Descuento</span><span>$0.00</span></div>
        <div class="tot-row grand"><span>TOTAL A PAGAR</span><span>$${total.toFixed(2)} USD</span></div>
      </div>

      ${trxChips.length ? `
      <div class="inv-section">
        <div class="inv-section-title">Datos del pago – Payphone</div>
        <div class="trx-grid">
          ${trxChips.map(c => `
          <div class="trx-chip">
            <div class="lbl">${c.lbl}</div>
            <div class="val ${c.cls||''}">${c.val}</div>
          </div>`).join('')}
        </div>
      </div>` : ''}

      <div class="inv-footer">
        <strong>Tienda Thiago</strong> · RUC 1390085123001 ·
        Factura electrónica generada automáticamente ·
        Pago procesado por <strong>Payphone</strong> 🔒
      </div>
    </div>

    <div class="final-actions">
      <a href="index.html" class="btn-lg btn-primary">🛒 Seguir comprando</a>
      <button class="btn-lg btn-secondary" onclick="window.print()">🖨️ Imprimir factura</button>
    </div>
  `;
}

window.addEventListener('DOMContentLoaded', confirmar);
</script>
</body>
</html>
